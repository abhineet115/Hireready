name: CI

on:
  push:
    branches: [main, master, "copilot/**"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── Backend Tests ────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hireready-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: hireready-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEYS: fake-key
          DEV_TEST_TOKEN: test-dev-token
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Build + Lint ────────────────────────────────────────
  frontend:
    name: Frontend Build & Lint (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hireready-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hireready-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE: http://localhost:8000
        run: npm run build
